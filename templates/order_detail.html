{% extends 'base.html' %}

{% block content %}

<h2>Order #{{ order.id }}</h2>

<p>
    <b>Status:</b>
    <span class="badge bg-info">
        {{ order.status }}
    </span>
</p>

<p><b>Total:</b> ₹{{ order.total_amount }}</p>

<hr>

<h4>Items</h4>

{% for item in items %}
<div class="card p-3 mb-2">
    <h5>{{ item.product.name }}</h5>
    <p>Qty: {{ item.quantity }}</p>
    <p>Price: ₹{{ item.price }}</p>
</div>
{% endfor %}

{% endblock %}
